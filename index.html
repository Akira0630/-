<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>归藏 | 极简资料库</title>
    <style>
        body {
            background-color: #f4f1de;
            color: #2b2d42;
            font-family: "STKaiti", "楷体", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { letter-spacing: 12px; font-size: 2.5rem; margin: 0; }
        .motto { color: #666; margin-top: 10px; letter-spacing: 4px; }
        
        .list { width: 100%; max-width: 500px; }
        .card {
            background: rgba(255,255,255,0.4);
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
            display: block;
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <div class="header">
        <h1>归 藏</h1>
        <div class="motto">大道至简 · 万物归藏</div>
    </div>
    <div class="list">
      
    </div>
</body>
</html>
